services:
  db:
    image: timescale/timescaledb:latest-pg15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_NAME:-sysroar}
      - POSTGRES_USER=${DB_USER:-sysroar_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-sysroar_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sysroar_user} -d ${DB_NAME:-sysroar}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    volumes:
      - .:/app
    env_file: .env
    environment:
      - DEBUG=${DEBUG:-True}
      - DATABASE_URL=postgres://${DB_USER:-sysroar_user}:${DB_PASSWORD:-sysroar_password}@db:5432/${DB_NAME:-sysroar}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  celery_worker:
    build: .
    volumes:
      - .:/app
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${DB_USER:-sysroar_user}:${DB_PASSWORD:-sysroar_password}@db:5432/${DB_NAME:-sysroar}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info

  celery_beat:
    build: .
    volumes:
      - .:/app
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${DB_USER:-sysroar_user}:${DB_PASSWORD:-sysroar_password}@db:5432/${DB_NAME:-sysroar}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config beat --loglevel=info

volumes:
  postgres_data:
